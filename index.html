<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dienstplan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
  <style>
  :root{
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-2: #1c1c1c;
    --border: #2b2b2b;
    --border-light: #363636;
    --text: #f0eeec;
    --text-dim: #948f8c;
    --text-dimmer: #625d5a;
    --red: #e0263a;
    --red-dim: #7a1420;
    --red-glow: rgba(224,38,58,0.35);
    --radius: 10px;
    --font-display: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%; overflow-x:hidden;}
  body{
    background:
      radial-gradient(1200px 600px at 100% -10%, rgba(224,38,58,0.08), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--red); color:#fff; }
  :focus-visible{ outline:2px solid var(--red); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; transition-duration:0.001ms !important; }
  }

  .app{ max-width:1100px; margin:0 auto; padding:28px 20px 80px; }

  /* HEADER */
  header.top{
    display:flex; align-items:flex-end; justify-content:space-between; gap:20px;
    flex-wrap:wrap; margin-bottom:28px; padding-bottom:20px; border-bottom:1px solid var(--border);
  }
  .brand{ display:flex; align-items:center; gap:14px; }
  .brand .mark{
    width:44px; height:44px; border-radius:8px; background:linear-gradient(155deg, var(--red), #8a0f1f);
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display);
    font-weight:700; font-size:19px; color:#fff; box-shadow:0 6px 20px var(--red-glow); flex-shrink:0;
  }
  h1{
    font-family:var(--font-display); font-weight:700; letter-spacing:0.04em; text-transform:uppercase;
    font-size:26px; line-height:1;
  }
  .brand .sub{ font-size:12.5px; color:var(--text-dim); margin-top:4px; letter-spacing:0.02em;}

  .toolbar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .seg{ display:flex; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:3px; }
  .seg button{
    background:transparent; border:none; color:var(--text-dim); font-family:var(--font-body);
    font-weight:600; font-size:13px; padding:7px 14px; border-radius:6px; cursor:pointer; transition:all .15s ease;
  }
  .seg button.active{ background:var(--red); color:#fff; }
  .seg button:not(.active):hover{ color:var(--text); }

  .btn{
    font-family:var(--font-body); font-weight:600; font-size:13px; border-radius:8px; cursor:pointer;
    padding:9px 16px; border:1px solid var(--border-light); background:var(--surface); color:var(--text);
    transition:all .15s ease; display:inline-flex; align-items:center; gap:7px; white-space:nowrap;
  }
  .btn:hover{ border-color:var(--text-dim); background:var(--surface-2); }
  .btn.primary{ background:var(--red); border-color:var(--red); color:#fff; }
  .btn.primary:hover{ background:#c81f31; box-shadow:0 4px 16px var(--red-glow); }
  .btn.ghost{ background:transparent; border-color:transparent; color:var(--text-dim); padding:9px 10px; }
  .btn.ghost:hover{ color:var(--text); background:var(--surface); }
  .btn.danger{ color:var(--red); }
  .btn.danger:hover{ background:rgba(224,38,58,0.1); border-color:var(--red-dim); }
  .btn svg{ width:15px; height:15px; flex-shrink:0; }
  input[type=file]{ display:none; }

  /* EMPTY STATE */
  .empty{
    text-align:center; padding:80px 20px; color:var(--text-dim); border:1px dashed var(--border);
    border-radius:var(--radius); background:var(--surface);
  }
  .empty .big{ font-family:var(--font-display); font-size:20px; text-transform:uppercase; letter-spacing:0.03em; color:var(--text); margin-bottom:8px;}
  .empty p{ font-size:13.5px; max-width:360px; margin:0 auto; line-height:1.6;}

  /* LIST VIEW */
  .month-group{ margin-bottom:34px; }
  .month-title{
    font-family:var(--font-display); font-size:14px; text-transform:uppercase; letter-spacing:0.08em;
    color:var(--red); margin-bottom:12px; display:flex; align-items:center; gap:10px;
  }
  .month-title::after{ content:''; flex:1; height:1px; background:var(--border); }

  .entry-card{
    display:flex; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    margin-bottom:10px; overflow:hidden; transition:border-color .15s ease, transform .15s ease;
    cursor:pointer;
  }
  .entry-card:hover{ border-color:var(--border-light); transform:translateX(2px); }
  .entry-stripe{ width:5px; flex-shrink:0; }
  .entry-body{ flex:1; padding:14px 16px; display:flex; gap:16px; align-items:center; flex-wrap:wrap; }
  .entry-date{
    font-family:var(--font-display); font-size:13px; color:var(--text-dim); min-width:118px; letter-spacing:0.02em;
  }
  .entry-date .range{ color:var(--text); }
  .entry-main{ flex:1; min-width:180px; }
  .entry-title{ font-weight:600; font-size:14.5px; margin-bottom:3px; }
  .entry-meta{ font-size:12px; color:var(--text-dim); display:flex; gap:12px; flex-wrap:wrap; }
  .entry-meta span{ display:inline-flex; align-items:center; gap:4px; }
  .entry-details{ font-size:12px; color:var(--text-dimmer); margin-top:4px; max-width:520px; }
  .entry-actions{ display:flex; gap:4px; margin-left:auto; }

  /* CALENDAR VIEW */
  .cal-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-nav .month-label{
    font-family:var(--font-display); font-size:19px; text-transform:uppercase; letter-spacing:0.03em;
  }
  .cal-nav .navbtns{ display:flex; gap:6px; }
  .icon-btn{
    width:34px; height:34px; border-radius:8px; background:var(--surface); border:1px solid var(--border);
    color:var(--text); display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .icon-btn:hover{ border-color:var(--text-dim); }

  .cal-grid{ display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; }
  .cal-weekdays-row{ display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; margin-bottom:6px; }
  .cal-week-wrap{ position:relative; margin-bottom:6px; }
  .cal-week-days{ display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:6px; }
  .cal-bars{ position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; }
  .cal-bars-spacer{ flex-shrink:0; }
  .cal-bar{
    position:absolute; border-radius:5px; color:#fff; overflow:hidden; cursor:pointer; pointer-events:auto;
    box-shadow:0 1px 4px rgba(0,0,0,0.45); display:flex; flex-direction:column; justify-content:center;
    padding:2px 8px; line-height:1.25;
  }
  .cal-weekday{ text-align:center; font-size:11px; color:var(--text-dimmer); text-transform:uppercase; letter-spacing:0.06em; padding-bottom:6px; font-weight:600;}
  .cal-day{
    background:var(--surface); border:1px solid var(--border); border-radius:8px; min-height:92px;
    padding:6px; display:flex; flex-direction:column; gap:3px; cursor:pointer; transition:border-color .15s ease;
    min-width:0; overflow:hidden;
  }
  .cal-day:hover{ border-color:var(--text-dim); }
  .cal-day.other-month{ opacity:0.35; }
  .cal-day.today{ border-color:var(--red); box-shadow:inset 0 0 0 1px var(--red); }
  .cal-day .num{ font-family:var(--font-display); font-size:13px; color:var(--text-dim); flex-shrink:0; }
  .cal-day.today .num{ color:var(--red); font-weight:700; }
  .cal-chip{
    padding:2px 6px; border-radius:4px; color:#fff; font-weight:600; line-height:1.25; flex-shrink:0;
    display:flex; flex-direction:column;
  }
  .cal-chip .chip-title, .cal-bar .chip-title{
    font-size:10.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .cal-chip .chip-time, .cal-bar .chip-time{
    font-size:9px; font-weight:500; opacity:0.85; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .cal-chip.more{ color:var(--text-dim); background:transparent; font-weight:500; font-size:10px; display:block; }

  /* MODAL */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.65); backdrop-filter:blur(3px);
    display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; z-index:50; overflow-y:auto;
  }
  .overlay.hidden{ display:none; }
  .modal{
    background:var(--surface); border:1px solid var(--border-light); border-radius:14px; width:100%; max-width:520px;
    padding:24px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .modal h2{
    font-family:var(--font-display); text-transform:uppercase; letter-spacing:0.03em; font-size:18px; margin-bottom:18px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:0.03em;}
  .field .hint{ font-weight:400; text-transform:none; color:var(--text-dimmer); letter-spacing:0; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  input[type=text], input[type=date], input[type=time], textarea{
    width:100%; background:var(--bg); border:1px solid var(--border-light); border-radius:8px; color:var(--text);
    padding:10px 12px; font-family:var(--font-body); font-size:13.5px;
  }
  input:focus, textarea:focus{ border-color:var(--red); }
  textarea{ resize:vertical; min-height:64px; }
  ::placeholder{ color:var(--text-dimmer); }

  .color-row{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .checkbox-label{
    display:flex !important; align-items:flex-start; gap:9px; cursor:pointer; font-size:13px; font-weight:500 !important;
    text-transform:none !important; letter-spacing:0 !important; color:var(--text) !important;
  }
  .checkbox-label input[type=checkbox]{ width:17px; height:17px; margin-top:1px; accent-color:var(--red); flex-shrink:0; cursor:pointer; }
  .swatch{
    width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent;
    transition:transform .1s ease;
  }
  .swatch:hover{ transform:scale(1.1); }
  .swatch.selected{ border-color:#fff; box-shadow:0 0 0 2px var(--bg), 0 0 0 3px var(--text); }
  .swatch.custom{
    background:conic-gradient(from 0deg, red, yellow, lime, cyan, blue, magenta, red);
    position:relative; display:flex; align-items:center; justify-content:center;
  }
  .swatch.custom input{ position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }

  .modal-actions{ display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px; }
  .modal-actions .left{ display:flex; gap:8px; }
  .modal-actions .right{ display:flex; gap:8px; }

  @media (max-width:600px){
    .row2{ grid-template-columns:1fr; }
    header.top{ align-items:flex-start; }
    .entry-body{ padding:12px; }

    /* Kalender: kompakter, damit zweizeilige Einträge auf Mobilgeräten passen */
    .cal-nav{ flex-wrap:wrap; gap:8px; }
    .cal-nav .month-label{ font-size:16px; }
    .cal-weekdays-row, .cal-week-days{ gap:3px; }
    .cal-week-wrap{ margin-bottom:3px; }
    .cal-day{ min-height:60px; padding:4px; border-radius:6px; gap:2px; }
    .cal-day .num{ font-size:11px; }
    .cal-chip{ padding:1px 4px; border-radius:3px; }
    .cal-chip .chip-title{ font-size:9px; }
    .cal-chip .chip-time{ font-size:7.5px; }
    .cal-chip.more{ font-size:8.5px; }
    .cal-bar{ padding:1px 5px; border-radius:4px; }
    .cal-bar .chip-title{ font-size:9px; }
    .cal-bar .chip-time{ font-size:7.5px; }
  }

  /* PAST SECTION (collapsible) */
  .past-toggle{
    display:flex; align-items:center; gap:10px; cursor:pointer; padding:12px 16px; background:var(--surface);
    border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; user-select:none;
  }
  .past-toggle:hover{ border-color:var(--border-light); }
  .past-toggle .chev{ transition:transform .15s ease; color:var(--text-dim); flex-shrink:0; }
  .past-toggle.open .chev{ transform:rotate(90deg); }
  .past-toggle .label{ font-family:var(--font-display); font-size:13px; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-dim); }
  .past-toggle .count{
    background:var(--surface-2); color:var(--text-dim); font-size:11px; font-weight:700; border-radius:20px;
    padding:2px 9px; margin-left:auto; border:1px solid var(--border);
  }
  .past-body{ display:none; opacity:0.75; }
  .past-body.open{ display:block; }

  /* VIEW (readonly) MODAL SECTION */
  .view-section .vs-title{ font-family:var(--font-display); font-size:19px; margin-bottom:14px; padding-right:10px; }
  .view-section .vs-row{ display:flex; gap:10px; padding:10px 0; border-top:1px solid var(--border); font-size:13.5px; }
  .view-section .vs-row:first-of-type{ border-top:none; }
  .view-section .vs-label{ width:110px; flex-shrink:0; color:var(--text-dim); font-size:12px; text-transform:uppercase; letter-spacing:0.03em; padding-top:2px;}
  .view-section .vs-value{ flex:1; }
  .view-section .vs-color{ width:16px; height:16px; border-radius:50%; display:inline-block; vertical-align:middle; margin-right:8px;}
  .view-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top:20px; }

  /* PRINT VIEW */
  .print-toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px;}
  .print-area{ background:#fff; color:#111; border-radius:8px; padding:28px; }
  .print-area h2{ font-family:var(--font-display); font-size:20px; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:4px; }
  .print-area .psub{ font-size:12px; color:#666; margin-bottom:18px; }
  table.print-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.print-table th{
    text-align:left; font-family:var(--font-display); font-size:11px; text-transform:uppercase; letter-spacing:0.04em;
    color:#666; border-bottom:2px solid #222; padding:8px 6px;
  }
  table.print-table td{ padding:8px 6px; border-bottom:1px solid #ddd; vertical-align:top; }
  table.print-table .dot{ width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:8px; }
  .print-empty{ padding:40px 0; text-align:center; color:#777; font-size:13px; }

  @media print{
    body *{ visibility:hidden; }
    #printArea, #printArea *{ visibility:visible; }
    #printArea{ position:absolute; top:0; left:0; width:100%; padding:0; margin:0; }
    .no-print{ display:none !important; }
    body{ background:#fff; }
  }

  /* DROPDOWN MENU */
  .menu-wrap{ position:relative; }
  #menuBtn{ padding:9px 11px; }
  .menu{
    position:absolute; top:calc(100% + 6px); right:0; background:var(--surface); border:1px solid var(--border-light);
    border-radius:10px; min-width:210px; padding:6px; box-shadow:0 14px 34px rgba(0,0,0,0.55); z-index:60;
  }
  .menu.hidden{ display:none; }
  .menu-item{
    display:flex; align-items:center; gap:10px; width:100%; background:transparent; border:none; color:var(--text);
    font-family:var(--font-body); font-size:13.5px; font-weight:600; padding:9px 10px; border-radius:7px;
    cursor:pointer; text-align:left;
  }
  .menu-item svg{ width:16px; height:16px; flex-shrink:0; }
  .menu-item:hover{ background:var(--surface-2); }
  .menu-item.danger{ color:var(--red); }
  .menu-item.danger:hover{ background:rgba(224,38,58,0.12); }
  .menu-divider{ height:1px; background:var(--border); margin:5px 4px; }

  /* EXCLUSION FIELDS (Wochenenden / weitere Tage) */
  .exclusions-box{ display:flex; flex-direction:column; gap:10px; }
  .exclude-dates-config{ padding-left:26px; display:flex; flex-direction:column; gap:10px; }
  .exclude-dates-config.hidden{ display:none; }
  .exclude-count-row{ display:flex; align-items:center; gap:10px; }
  .exclude-count-row input[type=number]{ width:70px; }
  .exclude-dates-list{ display:flex; flex-direction:column; gap:7px; }
  .exclude-date-row input[type=date]{ width:100%; }

  /* PRINT CALENDAR */
  .print-cal-grid{ display:grid; grid-template-columns:repeat(7,minmax(0,1fr)); gap:1px; background:#ddd; border:1px solid #ddd; margin-top:8px; }
  .print-cal-weekday{ background:#f2f2f2; text-align:center; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; padding:5px 2px; color:#555; }
  .print-cal-day{ background:#fff; min-height:74px; padding:4px 5px; min-width:0; overflow:hidden; }
  .print-cal-day.other-month{ background:#fafafa; }
  .print-cal-day.other-month .pnum{ color:#bbb; }
  .print-cal-day .pnum{ font-weight:700; font-size:11px; margin-bottom:3px; color:#222; }
  .print-cal-entry{ font-size:9px; line-height:1.3; margin-bottom:1px; color:#222; }
  .print-cal-entry .pdot{ display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:3px; }

  /* LANDSCAPE / SHORT VIEWPORT (mobile) */
  @media (max-height:520px) and (orientation:landscape){
    .app{ padding:14px 16px 40px; }
    header.top{ margin-bottom:14px; padding-bottom:12px; gap:10px; }
    .brand .mark{ width:34px; height:34px; font-size:14px; border-radius:7px; }
    h1{ font-size:17px; }
    .brand .sub{ display:none; }
    .cal-nav{ margin-bottom:10px; }
    .cal-nav .month-label{ font-size:15px; }
    .cal-day{ min-height:52px; padding:4px; }
    .cal-day .num{ font-size:11px; }
    .cal-chip{ padding:1px 4px; }
    .cal-chip .chip-title, .cal-bar .chip-title{ font-size:9px; }
    .cal-chip .chip-time, .cal-bar .chip-time{ font-size:7.5px; }
    .overlay{ padding:16px; align-items:center; }
    .modal{ max-height:92vh; overflow-y:auto; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="mark">DP</div>
      <div>
        <h1>Dienstplan</h1>
        <div class="sub">Schichten &amp; Urlaub im Überblick</div>
      </div>
    </div>
    <div class="toolbar">
      <div class="seg">
        <button id="viewListBtn" class="active">Liste</button>
        <button id="viewCalBtn">Kalender</button>
        <button id="viewPrintBtn">Drucken</button>
      </div>
      <div class="menu-wrap" id="menuWrap">
        <button class="btn icon-btn" id="menuBtn" title="Weitere Optionen" aria-label="Weitere Optionen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
        </button>
        <div class="menu hidden" id="menu">
          <button type="button" class="menu-item" id="exportBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
            Exportieren
          </button>
          <button type="button" class="menu-item" id="importBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21V9m0 0l-4 4m4-4l4 4M4 7V5a2 2 0 012-2h12a2 2 0 012 2v2"/></svg>
            Importieren
          </button>
          <div class="menu-divider"></div>
          <button type="button" class="menu-item danger" id="clearBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6h16z"/></svg>
            Dienstplan leeren
          </button>
        </div>
      </div>
      <input type="file" id="fileInput" accept="application/json">
      <button class="btn primary" id="newEntryBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Neuer Eintrag
      </button>
    </div>
  </header>

  <main id="listView"></main>
  <main id="calView" style="display:none;"></main>
  <main id="printView" style="display:none;">
    <div class="print-toolbar no-print">
      <div class="seg">
        <button id="printModeListBtn" class="active">Liste</button>
        <button id="printModeCalBtn">Kalender</button>
      </div>
      <div class="navbtns" style="display:flex; gap:6px; align-items:center;">
        <button class="icon-btn" id="printPrev">‹</button>
        <div class="month-label" id="printMonthLabel" style="font-family:var(--font-display); font-size:16px; text-transform:uppercase; min-width:170px; text-align:center;"></div>
        <button class="icon-btn" id="printNext">›</button>
      </div>
      <button class="btn primary" id="doPrintBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6v-8z"/></svg>
        Drucken
      </button>
    </div>
    <div class="print-area" id="printArea"></div>
  </main>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="view-section" id="viewSection">
      <h2 style="display:flex; justify-content:space-between; align-items:center;">
        <span id="vs-heading">Eintrag</span>
        <button type="button" class="btn ghost" id="closeViewModal" style="padding:6px;">✕</button>

      <div class="vs-title" id="vs-title"></div>
      <div class="vs-row"><div class="vs-label">Datum</div><div class="vs-value" id="vs-date"></div></div>
      <div class="vs-row" id="vs-time-row" style="display:none;"><div class="vs-label">Uhrzeit</div><div class="vs-value" id="vs-time"></div></div>
      <div class="vs-row" id="vs-break-row" style="display:none;"><div class="vs-label">Pause</div><div class="vs-value" id="vs-break"></div></div>

      <div class="field">
        <label>Titel</label>

            <div class="exclude-count-row">
              <span class="hint" style="text-transform:none;">Anzahl Tage</span>

      <div class="row2">
        <div class="field">
          <label>Uhrzeit von <span class="hint">(optional)</span></label>

          <label>Uhrzeit bis <span class="hint">(optional)</span></label>

          <label>Pause von <span class="hint">(optional)</span></label>

  </div>
</div>

<script>
(function(){
  "use strict";

  const PALETTE = [
    {name:'Rot', value:'#e0263a'},
    {name:'Orange', value:'#f2994a'},
    {name:'Gelb', value:'#f2c94c'},
    {name:'Grün', value:'#3fae5c'},
    {name:'Türkis', value:'#2ec4b6'},
    {name:'Blau', value:'#4a90d9'},
    {name:'Lila', value:'#9b59b6'},
    {name:'Grau', value:'#8a8a8a'},
  ];
  const STORAGE_KEY = 'dienstplan-entries';
  const WEEKDAYS = ['Mo','Di','Mi','Do','Fr','Sa','So'];
  const MONTHS = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];

  let entries = [];
  let view = 'list';
  let calCursor = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  let printCursor = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
  let editingId = null;
  let selectedColor = PALETTE[0].value;
  let pastOpen = false;

  const $ = (sel) => document.querySelector(sel);
  const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html!==undefined) e.innerHTML = html; return e; };
  const uid = () => 'e' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);

  function pad(n){ return String(n).padStart(2,'0'); }
  function toDateObj(str){ // 'yyyy-mm-dd' -> local Date at midnight
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function fmtDateDE(str){
    const d = toDateObj(str);
    return pad(d.getDate()) + '.' + pad(d.getMonth()+1) + '.' + d.getFullYear();
  }
  function sameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function isoLocal(d){ return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()); }

  function sortEntries(list){
    return [...list].sort((a,b) => {
      if(a.dateFrom !== b.dateFrom) return a.dateFrom < b.dateFrom ? -1 : 1;
      const ta = a.timeFrom || '';
      const tb = b.timeFrom || '';
      if(ta !== tb) return ta < tb ? -1 : 1;
      return a.title.localeCompare(b.title);
    });
  }

  function isMultiDay(entry){
    return !!entry.dateTo && entry.dateTo !== entry.dateFrom;
  }
  function isWeekend(dateObj){
    const dow = dateObj.getDay(); // 0=So, 6=Sa
    return dow === 0 || dow === 6;
  }
  function entryOccursOn(entry, dateIso){
    const to = entry.dateTo || entry.dateFrom;
    if(dateIso < entry.dateFrom || dateIso > to) return false;
    if(entry.excludeWeekends && isWeekend(toDateObj(dateIso))) return false;
    if(entry.excludeDates && entry.excludeDates.includes(dateIso)) return false;
    return true;
  }
  function exclusionNote(entry){
    const parts = [];
    if(entry.excludeWeekends) parts.push('ohne Wochenenden');
    if(entry.excludeDates && entry.excludeDates.length) parts.push(entry.excludeDates.length + ' Einzeltag(e) ausgeschlossen');
    return parts.length ? ' (' + parts.join(', ') + ')' : '';
  }

  // ---------- Persistence ----------
  async function save(){
    try{
      if(window.storage){
        await window.storage.set(STORAGE_KEY, JSON.stringify(entries), false);
      }
    }catch(err){ console.error('Speichern fehlgeschlagen', err); }
  }
  async function load(){
    try{
      if(window.storage){
        const res = await window.storage.get(STORAGE_KEY, false);
        if(res && res.value){
          entries = JSON.parse(res.value);
        }
      }
    }catch(err){ /* kein gespeicherter Stand vorhanden */ }
    render();
  }

  // ---------- Rendering: List ----------
  function render(){
    if(view === 'list') renderList();
    else if(view === 'cal') renderCalendar();
    else renderPrint();
  }

  function groupByMonth(list, ascending){
    const sorted = ascending ? sortEntries(list) : sortEntries(list).reverse();
    const groups = new Map();
    sorted.forEach(entry => {
      const d = toDateObj(entry.dateFrom);
      const key = d.getFullYear() + '-' + pad(d.getMonth()+1);
      if(!groups.has(key)) groups.set(key, []);
      groups.get(key).push(entry);
    });
    return groups;
  }

  function appendMonthGroups(container, groups){
    for(const [key, items] of groups){
      const [y,m] = key.split('-').map(Number);
      const group = el('div','month-group');
      group.appendChild(el('div','month-title', MONTHS[m-1] + ' ' + y));
      items.forEach(entry => group.appendChild(entryCard(entry)));
      container.appendChild(group);
    }
  }

  function renderList(){
    const container = $('#listView');
    container.innerHTML = '';
    if(entries.length === 0){
      container.appendChild(emptyState('Noch keine Einträge', 'Lege deine erste Schicht oder deinen Urlaub an — über „Neuer Eintrag“ oben rechts.'));
      return;
    }
    const todayIso = isoLocal(new Date());
    // Ein Eintrag gilt erst als "vergangen", wenn sein LETZTER Tag vor heute liegt.
    const upcoming = entries.filter(e => (e.dateTo || e.dateFrom) >= todayIso);
    const past = entries.filter(e => (e.dateTo || e.dateFrom) < todayIso);

    if(upcoming.length === 0){
      container.appendChild(emptyState('Keine aktuellen Einträge', 'Alle Einträge liegen in der Vergangenheit — siehe unten, oder lege einen neuen Eintrag an.'));
    } else {
      appendMonthGroups(container, groupByMonth(upcoming, true));
    }

    if(past.length > 0){
      const toggle = el('div','past-toggle' + (pastOpen ? ' open' : ''));
      toggle.innerHTML = '<span class="chev">›</span><span class="label">Vergangene Einträge</span><span class="count">' + past.length + '</span>';
      toggle.addEventListener('click', () => { pastOpen = !pastOpen; renderList(); });
      container.appendChild(toggle);

      const pastBody = el('div','past-body' + (pastOpen ? ' open' : ''));
      appendMonthGroups(pastBody, groupByMonth(past, false));
      container.appendChild(pastBody);
    }
  }

  function emptyState(title, text){
    const wrap = el('div','empty');
    wrap.appendChild(el('div','big', title));
    wrap.appendChild(el('p', null, text));
    return wrap;
  }

  function entryCard(entry){
    const card = el('div','entry-card');
    card.appendChild(el('div','entry-stripe')).style.background = entry.color;
    const body = el('div','entry-body');

    const dateWrap = el('div','entry-date');
    if(entry.dateTo && entry.dateTo !== entry.dateFrom){
      dateWrap.innerHTML = '<span class="range">' + fmtDateDE(entry.dateFrom) + '</span> – <span class="range">' + fmtDateDE(entry.dateTo) + '</span>' + escapeHtml(exclusionNote(entry));
    } else {
      dateWrap.innerHTML = '<span class="range">' + fmtDateDE(entry.dateFrom) + '</span>';
    }
    body.appendChild(dateWrap);

    const main = el('div','entry-main');
    main.appendChild(el('div','entry-title', escapeHtml(entry.title)));
    const meta = el('div','entry-meta');
    if(entry.timeFrom){
      meta.appendChild(el('span', null, '🕐 ' + entry.timeFrom + (entry.timeTo ? '–' + entry.timeTo : '')));
    }
    if(entry.breakFrom){
      meta.appendChild(el('span', null, '⏸ Pause ' + entry.breakFrom + (entry.breakTo ? '–' + entry.breakTo : '')));
    }
    if(meta.children.length) main.appendChild(meta);
    if(entry.details){
      main.appendChild(el('div','entry-details', escapeHtml(entry.details)));
    }
    body.appendChild(main);

    card.appendChild(body);
    card.addEventListener('click', () => openModal(entry.id));
    return card;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  // ---------- Rendering: Calendar ----------
  function getCalMetrics(){
    const mobile = window.innerWidth < 600;
    return {
      mobile,
      BAR_H: mobile ? 28 : 32,
      BAR_GAP: mobile ? 2 : 3,
      HEAD_OFFSET: mobile ? 21 : 25,
      maxShowSingle: mobile ? 1 : 2,
    };
  }

  function chipInnerHtml(entry){
    const timeLine = entry.timeFrom
      ? '<div class="chip-time">' + entry.timeFrom + (entry.timeTo ? '–' + entry.timeTo : '') + '</div>'
      : '';
    return '<div class="chip-title">' + escapeHtml(entry.title) + '</div>' + timeLine;
  }

  function renderCalendar(){
    const container = $('#calView');
    container.innerHTML = '';

    const nav = el('div','cal-nav');
    const label = el('div','month-label', MONTHS[calCursor.getMonth()] + ' ' + calCursor.getFullYear());
    const btns = el('div','navbtns');
    const prev = el('button','icon-btn','‹');
    const today = el('button','btn','Heute');
    const next = el('button','icon-btn','›');
    prev.addEventListener('click', () => { calCursor.setMonth(calCursor.getMonth()-1); renderCalendar(); });
    next.addEventListener('click', () => { calCursor.setMonth(calCursor.getMonth()+1); renderCalendar(); });
    today.addEventListener('click', () => { calCursor = new Date(new Date().getFullYear(), new Date().getMonth(), 1); renderCalendar(); });
    btns.appendChild(prev); btns.appendChild(today); btns.appendChild(next);
    nav.appendChild(label); nav.appendChild(btns);
    container.appendChild(nav);

    const weekHead = el('div','cal-weekdays-row');
    WEEKDAYS.forEach(w => weekHead.appendChild(el('div','cal-weekday', w)));
    container.appendChild(weekHead);

    const firstOfMonth = new Date(calCursor.getFullYear(), calCursor.getMonth(), 1);
    let startOffset = firstOfMonth.getDay() - 1; // Monday=0
    if(startOffset < 0) startOffset = 6;
    const gridStart = new Date(firstOfMonth);
    gridStart.setDate(gridStart.getDate() - startOffset);

    const now = new Date();
    const { BAR_H, BAR_GAP, HEAD_OFFSET, maxShowSingle } = getCalMetrics();
    const multiDayEntries = sortEntries(entries.filter(isMultiDay));

    for(let w=0; w<6; w++){
      const weekDates = [];
      for(let d=0; d<7; d++){
        const cellDate = new Date(gridStart);
        cellDate.setDate(gridStart.getDate() + w*7 + d);
        weekDates.push(cellDate);
      }

      // Determine which multi-day entries have a run of columns in this week
      const weekRuns = []; // {entry, start, end}
      multiDayEntries.forEach(entry => {
        const cols = [];
        weekDates.forEach((d,i) => { if(entryOccursOn(entry, isoLocal(d))) cols.push(i); });
        if(cols.length === 0) return;
        // group into contiguous runs (weekend gaps split a run)
        let run = null;
        cols.forEach(c => {
          if(run && c === run.end + 1){ run.end = c; }
          else { run = { entry, start: c, end: c }; weekRuns.push(run); }
        });
      });

      // assign lanes (greedy, avoid overlapping columns in same lane)
      const lanes = []; // array of arrays of runs
      weekRuns.forEach(run => {
        let laneIdx = lanes.findIndex(lane => lane.every(r => r.end < run.start || r.start > run.end));
        if(laneIdx === -1){ laneIdx = lanes.length; lanes.push([]); }
        lanes[laneIdx].push(run);
        run.lane = laneIdx;
      });
      const lanesCount = lanes.length;
      // Reserved space AFTER the day number for the connected multi-day bars —
      // the date itself always stays fixed at the top of the cell.
      const barsReserve = lanesCount > 0 ? lanesCount * (BAR_H + BAR_GAP) + 4 : 0;

      const weekWrap = el('div','cal-week-wrap');
      const daysGrid = el('div','cal-week-days');

      weekDates.forEach(cellDate => {
        const cell = el('div','cal-day');
        if(cellDate.getMonth() !== calCursor.getMonth()) cell.classList.add('other-month');
        if(sameDay(cellDate, now)) cell.classList.add('today');
        cell.appendChild(el('div','num', cellDate.getDate()));

        if(barsReserve > 0){
          const spacer = el('div','cal-bars-spacer');
          spacer.style.height = barsReserve + 'px';
          cell.appendChild(spacer);
        }

        const dayIso = isoLocal(cellDate);
        const singleDayEntries = sortEntries(entries.filter(e => !isMultiDay(e) && e.dateFrom === dayIso));
        singleDayEntries.slice(0, maxShowSingle).forEach(entry => {
          const chip = el('div','cal-chip');
          chip.innerHTML = chipInnerHtml(entry);
          chip.style.background = entry.color;
          chip.title = entry.title + (entry.timeFrom ? ' · ' + entry.timeFrom + (entry.timeTo ? '–' + entry.timeTo : '') : '');
          chip.addEventListener('click', (ev) => { ev.stopPropagation(); openModal(entry.id); });
          cell.appendChild(chip);
        });
        if(singleDayEntries.length > maxShowSingle){
          cell.appendChild(el('div','cal-chip more', '+' + (singleDayEntries.length - maxShowSingle) + ' weitere'));
        }

        cell.addEventListener('click', () => openModal(null, dayIso));
        daysGrid.appendChild(cell);
      });

      weekWrap.appendChild(daysGrid);

      if(weekRuns.length > 0){
        const barsLayer = el('div','cal-bars');
        weekRuns.forEach(run => {
          const span = run.end - run.start + 1;
          const bar = el('div','cal-bar');
          bar.innerHTML = chipInnerHtml(run.entry);
          bar.style.left = 'calc(' + (run.start/7*100) + '% + 3px)';
          bar.style.width = 'calc(' + (span/7*100) + '% - 6px)';
          bar.style.top = (HEAD_OFFSET + run.lane*(BAR_H+BAR_GAP)) + 'px';
          bar.style.height = BAR_H + 'px';
          bar.style.background = run.entry.color;
          bar.title = run.entry.title + (run.entry.timeFrom ? ' · ' + run.entry.timeFrom + (run.entry.timeTo ? '–' + run.entry.timeTo : '') : '') + exclusionNote(run.entry);
          bar.addEventListener('click', (ev) => { ev.stopPropagation(); openModal(run.entry.id); });
          barsLayer.appendChild(bar);
        });
        weekWrap.appendChild(barsLayer);
      }

      container.appendChild(weekWrap);
    }
  }

  // ---------- Print view ----------
  let printMode = 'list';

  function renderPrint(){
    $('#printMonthLabel').textContent = MONTHS[printCursor.getMonth()] + ' ' + printCursor.getFullYear();
    if(printMode === 'list') renderPrintList(); else renderPrintCalendar();
  }

  function renderPrintList(){
    const monthStart = isoLocal(new Date(printCursor.getFullYear(), printCursor.getMonth(), 1));
    const monthEnd = isoLocal(new Date(printCursor.getFullYear(), printCursor.getMonth() + 1, 0));

    const monthEntries = sortEntries(entries.filter(e => {
      const to = e.dateTo || e.dateFrom;
      return e.dateFrom <= monthEnd && to >= monthStart;
    }));

    const area = $('#printArea');
    area.innerHTML = '';
    area.appendChild(el('h2', null, 'Dienstplan'));
    area.appendChild(el('div','psub', MONTHS[printCursor.getMonth()] + ' ' + printCursor.getFullYear()));

    if(monthEntries.length === 0){
      area.appendChild(el('div','print-empty','Keine Einträge in diesem Monat.'));
      return;
    }

    const table = el('table','print-table');
    table.innerHTML = '<thead><tr><th>Datum</th><th>Zeit</th><th>Titel</th></tr></thead>';
    const tbody = el('tbody');
    monthEntries.forEach(entry => {
      const tr = el('tr');
      const dateStr = (entry.dateTo && entry.dateTo !== entry.dateFrom)
        ? fmtDateDE(entry.dateFrom) + ' – ' + fmtDateDE(entry.dateTo) + exclusionNote(entry)
        : fmtDateDE(entry.dateFrom);
      const timeStr = entry.timeFrom ? (entry.timeFrom + (entry.timeTo ? ' – ' + entry.timeTo : '')) : '—';
      tr.appendChild(el('td', null, dateStr));
      tr.appendChild(el('td', null, timeStr));
      const titleTd = el('td', null, '<span class="dot" style="background:' + entry.color + '"></span>' + escapeHtml(entry.title));
      tr.appendChild(titleTd);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    area.appendChild(table);
  }

  function renderPrintCalendar(){
    const area = $('#printArea');
    area.innerHTML = '';
    area.appendChild(el('h2', null, 'Dienstplan'));
    area.appendChild(el('div','psub', MONTHS[printCursor.getMonth()] + ' ' + printCursor.getFullYear()));

    const grid = el('div','print-cal-grid');
    WEEKDAYS.forEach(w => grid.appendChild(el('div','print-cal-weekday', w)));

    const firstOfMonth = new Date(printCursor.getFullYear(), printCursor.getMonth(), 1);
    let startOffset = firstOfMonth.getDay() - 1;
    if(startOffset < 0) startOffset = 6;
    const gridStart = new Date(firstOfMonth);
    gridStart.setDate(gridStart.getDate() - startOffset);

    for(let i=0; i<42; i++){
      const cellDate = new Date(gridStart);
      cellDate.setDate(gridStart.getDate() + i);
      const cell = el('div','print-cal-day');
      if(cellDate.getMonth() !== printCursor.getMonth()) cell.classList.add('other-month');
      cell.appendChild(el('div','pnum', cellDate.getDate()));

      const dayIso = isoLocal(cellDate);
      const dayEntries = sortEntries(entries.filter(e => entryOccursOn(e, dayIso)));
      dayEntries.forEach(entry => {
        const line = el('div','print-cal-entry');
        const timePart = entry.timeFrom ? entry.timeFrom + (entry.timeTo ? '–' + entry.timeTo : '') + ' ' : '';
        line.innerHTML = '<span class="pdot" style="background:' + entry.color + '"></span>' + timePart + escapeHtml(entry.title);
        cell.appendChild(line);
      });

      grid.appendChild(cell);
    }
    area.appendChild(grid);
  }

  $('#printModeListBtn').addEventListener('click', () => {
    printMode = 'list';
    $('#printModeListBtn').classList.add('active');
    $('#printModeCalBtn').classList.remove('active');
    renderPrint();
  });
  $('#printModeCalBtn').addEventListener('click', () => {
    printMode = 'cal';
    $('#printModeCalBtn').classList.add('active');
    $('#printModeListBtn').classList.remove('active');
    renderPrint();
  });

  $('#printPrev').addEventListener('click', () => { printCursor.setMonth(printCursor.getMonth()-1); renderPrint(); });
  $('#printNext').addEventListener('click', () => { printCursor.setMonth(printCursor.getMonth()+1); renderPrint(); });
  $('#doPrintBtn').addEventListener('click', () => window.print());

  // ---------- Dropdown menu ----------
  const menuBtn = $('#menuBtn');
  const menuEl = $('#menu');
  menuBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    menuEl.classList.toggle('hidden');
  });
  document.addEventListener('click', (e) => {
    if(!menuEl.classList.contains('hidden') && !$('#menuWrap').contains(e.target)){
      menuEl.classList.add('hidden');
    }
  });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape') menuEl.classList.add('hidden'); });

  $('#clearBtn').addEventListener('click', () => {
    menuEl.classList.add('hidden');
    if(entries.length === 0) return;
    if(confirm('Wirklich den gesamten Dienstplan löschen? Alle Einträge werden unwiderruflich entfernt.')){
      entries = [];
      pastOpen = false;
      save();
      render();
    }
  });

  // ---------- Modal ----------
  function buildColorRow(){
    const row = $('#colorRow');
    row.innerHTML = '';
    PALETTE.forEach(c => {
      const sw = el('div','swatch');
      sw.style.background = c.value;
      sw.title = c.name;
      sw.dataset.color = c.value;
      if(c.value === selectedColor) sw.classList.add('selected');
      sw.addEventListener('click', () => { selectedColor = c.value; buildColorRow(); });
      row.appendChild(sw);
    });
    const custom = el('div','swatch custom');
    custom.title = 'Eigene Farbe';
    const isCustom = !PALETTE.some(c => c.value === selectedColor);
    if(isCustom) custom.classList.add('selected');
    const input = el('input');
    input.type = 'color';
    input.value = selectedColor;
    input.addEventListener('input', (e) => { selectedColor = e.target.value; buildColorRow(); });
    custom.appendChild(input);
    row.appendChild(custom);
  }

  function updateWeekendFieldVisibility(){
    const from = $('#f-dateFrom').value;
    const to = $('#f-dateTo').value;
    const isMulti = from && to && to !== from;
    $('#weekendField').style.display = isMulti ? '' : 'none';
    if(!isMulti){
      $('#f-excludeWeekends').checked = false;
      $('#f-excludeDatesEnabled').checked = false;
      $('#excludeDatesConfig').classList.add('hidden');
    }
  }
  $('#f-dateFrom').addEventListener('input', updateWeekendFieldVisibility);
  $('#f-dateTo').addEventListener('input', updateWeekendFieldVisibility);

  function buildExcludeDatesInputs(count, existingValues){
    const list = $('#excludeDatesList');
    list.innerHTML = '';
    for(let i=0; i<count; i++){
      const row = el('div','exclude-date-row');
      const input = el('input');
      input.type = 'date';
      input.dataset.excludeDate = 'true';
      if(existingValues && existingValues[i]) input.value = existingValues[i];
      row.appendChild(input);
      list.appendChild(row);
    }
  }
  function getExcludeDatesCount(){
    return Math.max(1, Math.min(30, parseInt($('#f-excludeDatesCount').value, 10) || 1));
  }
  $('#f-excludeDatesEnabled').addEventListener('change', (e) => {
    $('#excludeDatesConfig').classList.toggle('hidden', !e.target.checked);
    if(e.target.checked && $('#excludeDatesList').children.length === 0){
      buildExcludeDatesInputs(getExcludeDatesCount(), []);
    }
  });
  $('#f-excludeDatesCount').addEventListener('input', () => {
    const existing = Array.from($('#excludeDatesList').querySelectorAll('input')).map(i => i.value);
    buildExcludeDatesInputs(getExcludeDatesCount(), existing);
  });

  function showViewSection(){
    $('#viewSection').style.display = '';
    $('#modalTitle').style.display = 'none';
    $('#entryForm').style.display = 'none';
  }
  function showFormSection(){
    $('#viewSection').style.display = 'none';
    $('#modalTitle').style.display = 'flex';
    $('#entryForm').style.display = '';
  }

  function fillViewSection(entry){
    $('#vs-title').textContent = entry.title;
    const dateStr = (entry.dateTo && entry.dateTo !== entry.dateFrom)
      ? fmtDateDE(entry.dateFrom) + ' – ' + fmtDateDE(entry.dateTo) + exclusionNote(entry)
      : fmtDateDE(entry.dateFrom);
    $('#vs-date').textContent = dateStr;
    if(entry.timeFrom){
      $('#vs-time-row').style.display = '';
      $('#vs-time').textContent = entry.timeFrom + (entry.timeTo ? ' – ' + entry.timeTo : '');
    } else {
      $('#vs-time-row').style.display = 'none';
    }
    if(entry.breakFrom){
      $('#vs-break-row').style.display = '';
      $('#vs-break').textContent = entry.breakFrom + (entry.breakTo ? ' – ' + entry.breakTo : '');
    } else {
      $('#vs-break-row').style.display = 'none';
    }
    $('#vs-color').innerHTML = '<span class="vs-color" style="background:' + entry.color + '"></span>' + entry.color;
    if(entry.details){
      $('#vs-details-row').style.display = '';
      $('#vs-details').textContent = entry.details;
    } else {
      $('#vs-details-row').style.display = 'none';
    }
  }

  function fillFormSection(entry, prefillDate){
    const form = $('#entryForm');
    form.reset();
    $('#excludeDatesList').innerHTML = '';
    $('#excludeDatesConfig').classList.add('hidden');
    if(entry){
      $('#modalTitle').firstChild.textContent = 'Eintrag bearbeiten';
      $('#f-title').value = entry.title;
      $('#f-dateFrom').value = entry.dateFrom;
      $('#f-dateTo').value = entry.dateTo && entry.dateTo !== entry.dateFrom ? entry.dateTo : '';
      $('#f-timeFrom').value = entry.timeFrom || '';
      $('#f-timeTo').value = entry.timeTo || '';
      $('#f-breakFrom').value = entry.breakFrom || '';
      $('#f-breakTo').value = entry.breakTo || '';
      $('#f-details').value = entry.details || '';
      selectedColor = entry.color;
      $('#deleteBtn').style.display = 'inline-flex';
    } else {
      $('#modalTitle').firstChild.textContent = 'Neuer Eintrag';
      $('#f-dateFrom').value = prefillDate || isoLocal(new Date());
      selectedColor = PALETTE[0].value;
      $('#deleteBtn').style.display = 'none';
    }
    buildColorRow();
    updateWeekendFieldVisibility();
    $('#f-excludeWeekends').checked = entry ? !!entry.excludeWeekends : false;

    const hasExcludeDates = entry && entry.excludeDates && entry.excludeDates.length > 0;
    $('#f-excludeDatesEnabled').checked = !!hasExcludeDates;
    if(hasExcludeDates){
      $('#excludeDatesConfig').classList.remove('hidden');
      $('#f-excludeDatesCount').value = entry.excludeDates.length;
      buildExcludeDatesInputs(entry.excludeDates.length, entry.excludeDates);
    } else {
      $('#f-excludeDatesCount').value = 1;
    }
  }

  function openModal(id, prefillDate){
    editingId = id;
    if(id){
      const entry = entries.find(e => e.id === id);
      fillViewSection(entry);
      showViewSection();
      $('#overlay').classList.remove('hidden');
    } else {
      fillFormSection(null, prefillDate);
      showFormSection();
      $('#overlay').classList.remove('hidden');
      $('#f-title').focus();
    }
  }

  function switchToEdit(){
    const entry = entries.find(e => e.id === editingId);
    fillFormSection(entry, null);
    showFormSection();
    $('#f-title').focus();
  }

  function closeModal(){
    $('#overlay').classList.add('hidden');
    editingId = null;
  }

  $('#entryForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const title = $('#f-title').value.trim();
    const dateFrom = $('#f-dateFrom').value;
    let dateTo = $('#f-dateTo').value;
    if(!title || !dateFrom) return;
    if(dateTo && dateTo < dateFrom) dateTo = dateFrom;

    const isMulti = dateTo && dateTo !== dateFrom;
    let excludeDates = [];
    if(isMulti && $('#f-excludeDatesEnabled').checked){
      excludeDates = Array.from($('#excludeDatesList').querySelectorAll('input[type=date]'))
        .map(i => i.value)
        .filter(v => v && v >= dateFrom && v <= dateTo);
      excludeDates = [...new Set(excludeDates)];
    }

    const data = {
      title,
      dateFrom,
      dateTo: dateTo || dateFrom,
      timeFrom: $('#f-timeFrom').value || '',
      timeTo: $('#f-timeTo').value || '',
      breakFrom: $('#f-breakFrom').value || '',
      breakTo: $('#f-breakTo').value || '',
      details: $('#f-details').value.trim(),
      color: selectedColor,
      excludeWeekends: isMulti ? $('#f-excludeWeekends').checked : false,
      excludeDates: excludeDates,
    };

    if(editingId){
      const idx = entries.findIndex(e => e.id === editingId);
      entries[idx] = { ...entries[idx], ...data };
    } else {
      entries.push({ id: uid(), ...data });
    }
    save();
    closeModal();
    render();
  });

  $('#deleteBtn').addEventListener('click', () => {
    if(!editingId) return;
    if(confirm('Diesen Eintrag wirklich löschen?')){
      entries = entries.filter(e => e.id !== editingId);
      save();
      closeModal();
      render();
    }
  });

  $('#cancelBtn').addEventListener('click', closeModal);
  $('#closeModal').addEventListener('click', closeModal);
  $('#closeViewModal').addEventListener('click', closeModal);
  $('#viewEditBtn').addEventListener('click', switchToEdit);
  $('#viewDeleteBtn').addEventListener('click', () => {
    if(!editingId) return;
    if(confirm('Diesen Eintrag wirklich löschen?')){
      entries = entries.filter(e => e.id !== editingId);
      save();
      closeModal();
      render();
    }
  });
  $('#overlay').addEventListener('click', (e) => { if(e.target.id === 'overlay') closeModal(); });
  document.addEventListener('keydown', (e) => { if(e.key === 'Escape' && !$('#overlay').classList.contains('hidden')) closeModal(); });

  $('#newEntryBtn').addEventListener('click', () => openModal(null));

  // ---------- View toggle ----------
  function setActiveViewBtn(){
    $('#viewListBtn').classList.toggle('active', view === 'list');
    $('#viewCalBtn').classList.toggle('active', view === 'cal');
    $('#viewPrintBtn').classList.toggle('active', view === 'print');
    $('#listView').style.display = view === 'list' ? '' : 'none';
    $('#calView').style.display = view === 'cal' ? '' : 'none';
    $('#printView').style.display = view === 'print' ? '' : 'none';
  }
  $('#viewListBtn').addEventListener('click', () => { view = 'list'; setActiveViewBtn(); render(); });
  $('#viewCalBtn').addEventListener('click', () => { view = 'cal'; setActiveViewBtn(); render(); });
  $('#viewPrintBtn').addEventListener('click', () => { view = 'print'; setActiveViewBtn(); render(); });

  // ---------- Export / Import ----------
  $('#exportBtn').addEventListener('click', () => {
    menuEl.classList.add('hidden');
    const payload = { exportedAt: new Date().toISOString(), entries };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'dienstplan-' + isoLocal(new Date()) + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  $('#importBtn').addEventListener('click', () => { menuEl.classList.add('hidden'); $('#fileInput').click(); });
  $('#fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try{
        const data = JSON.parse(ev.target.result);
        const list = Array.isArray(data) ? data : data.entries;
        if(!Array.isArray(list)) throw new Error('Ungültiges Format');
        const valid = list.every(it => it.title && it.dateFrom);
        if(!valid) throw new Error('Ungültige Einträge');
        const doReplace = entries.length === 0 || confirm('Vorhandene Einträge durch die Datei ersetzen? (Abbrechen = zusammenführen)');
        if(doReplace){
          entries = list.map(it => ({ id: it.id || uid(), ...it }));
        } else {
          const existingIds = new Set(entries.map(e => e.id));
          list.forEach(it => {
            const item = { id: it.id || uid(), ...it };
            if(existingIds.has(item.id)) item.id = uid();
            entries.push(item);
          });
        }
        save();
        render();
      }catch(err){
        alert('Die Datei konnte nicht gelesen werden: ' + err.message);
      }
      $('#fileInput').value = '';
    };
    reader.readAsText(file);
  });

  // ---------- Init ----------
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => { if(view === 'cal') renderCalendar(); }, 150);
  });

  load();
})();
</script>
</body>
</html>
